{{- $p := dict "Values" .Values -}}
{{- $_ := set $p "ApplicationGroup" .Values.project -}}
{{- $_ := set $p "Name" "@@NAME@@" -}}
{{- $_ := set $p "BackoffLimit" @@BACKOFF_LIMIT@@ -}}
{{- $_ := set $p "TTLSecondsAfterFinished" @@TTL@@ -}}
{{- $_ := set $p "ModuleValues" .Values.@@VALUES_KEY@@ -}}
{{- $_ := set $p "Ports" "@@VALUES_KEY@@.ports" -}}
{{ include "ag-template.job" $p }}

{{- define "@@VALUES_KEY@@.ports" -}}
- name: http
  containerPort: 8080
  protocol: TCP
{{- end }}
