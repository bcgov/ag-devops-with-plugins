{{/*
  ExternalSecret — integrates with Vault SecretStore on OpenShift Emerald.
  Requires the external-secrets operator to be installed in the namespace.

  Add to your values.yaml:
  @@VALUES_KEY@@:
    externalSecret:
      secretStoreName: vault           # the SecretStore/ClusterSecretStore name
      keys:
        - remoteRef: secret/path/MY_SECRET
          secretKey: MY_SECRET
*/}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.project }}-@@NAME@@
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: @@NAME@@
    app.kubernetes.io/part-of: {{ .Values.project }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.@@VALUES_KEY@@.externalSecret.secretStoreName | default "vault" }}
    kind: SecretStore
  target:
    name: {{ .Values.project }}-@@NAME@@
    creationPolicy: Owner
  data:
  {{- range .Values.@@VALUES_KEY@@.externalSecret.keys }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef }}
  {{- end }}
